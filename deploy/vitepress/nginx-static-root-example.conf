# 纯静态部署：VitePress 构建产物（docs/.vitepress/dist 内文件）放到 VPS 某一目录，
# 由你现有的 Nginx 网关直接以 root 提供静态文件，无需再跑「文档专用」容器。
#
# 步骤概要：
# 1）本地或 CI：pnpm build && pnpm docs:build
# 2）将 dist 内全部文件同步到 VPS，例如 /var/www/dot-present-docs/（与下方 root 一致）
# 3）在现有 Nginx 中增加或合并下列 server（并配置 SSL 时把 listen 443 ssl 等按你环境补上）

# server {
#     listen 80;
#     server_name docs.你的域名.com;
#
#     # 目录内应为 index.html、assets/、各页面 .html 等（即 dist 根目录内容）
#     root /var/www/dot-present-docs;
#     index index.html;
#
#     # 静态资源可加长缓存；按需在 location 里改时间
#     location ^~ /assets/ {
#         expires 7d;
#         add_header Cache-Control "public, immutable";
#         try_files $uri =404;
#     }
#
#     location / {
#         # 常见静态站：先找文件/目录，再找同名 .html（视 VitePress 实际 URL 结构可微调）
#         try_files $uri $uri/ $uri.html =404;
#     }
#
#     # 可选：文本压缩
#     gzip on;
#     gzip_types text/css application/javascript application/json image/svg+xml;
# }
