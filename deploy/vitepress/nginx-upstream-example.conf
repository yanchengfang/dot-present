# 以下片段供「现有 Nginx 容器 / 宿主机 Nginx」参考，按需合并进自己的 server { }，勿直接整文件 include（除非你自行包一层 server）。
#
# 架构：文档单独容器（本仓库 compose 中服务名 dot-present-docs，容器内监听 80）；
#       现有 Nginx 对外监听 80/443，只做反向代理。

# ---------------------------------------------------------------------------
# 方式 A：文档容器与 Nginx 容器在同一 Docker 网络（推荐，无需暴露宿主机 4173）
# 1）docker network ls 查看现有 Nginx 所在网络名
# 2）在本仓库 deploy/vitepress/docker-compose.yml 里给 dot-present-docs 挂上该 external 网络
# 3）proxy_pass 使用服务名（与 compose 中 service 名一致）
# ---------------------------------------------------------------------------
# server {
#     listen 80;
#     server_name docs.你的域名.com;
#
#     location / {
#         proxy_pass http://dot-present-docs:80;
#         proxy_set_header Host $host;
#         proxy_set_header X-Real-IP $remote_addr;
#         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#         proxy_set_header X-Forwarded-Proto $scheme;
#     }
# }

# ---------------------------------------------------------------------------
# 方式 B：文档映射到宿主机 4173（compose 中 ports: "4173:80"），Nginx 容器访问宿主机
# 启动 Nginx 容器时需加：--add-host=host.docker.internal:host-gateway
# 若无效，可改用宿主机在 docker0 上的网关 IP（常见 172.17.0.1），以实际 inspect 为准
# ---------------------------------------------------------------------------
# server {
#     listen 80;
#     server_name docs.你的域名.com;
#
#     location / {
#         proxy_pass http://host.docker.internal:4173;
#         proxy_set_header Host $host;
#         proxy_set_header X-Real-IP $remote_addr;
#         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#         proxy_set_header X-Forwarded-Proto $scheme;
#     }
# }

# ---------------------------------------------------------------------------
# 方式 C：Nginx 跑在宿主机（非容器），文档容器已映射 4173:80
# ---------------------------------------------------------------------------
# server {
#     listen 80;
#     server_name docs.你的域名.com;
#
#     location / {
#         proxy_pass http://127.0.0.1:4173;
#         proxy_set_header Host $host;
#         proxy_set_header X-Real-IP $remote_addr;
#         proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#         proxy_set_header X-Forwarded-Proto $scheme;
#     }
# }
